text_sensor:
  - platform: template
    name: "Alarm 1 DateTime"
    id: alarm_list_1_datetime
    lambda: |-
      uint16_t alarmDate = id(alarm_list_1_date).state;
      uint16_t alarmTime = id(alarm_list_1_time).state;

      if(!alarmDate ||!alarmTime) return std::string("");
      
      // Parse the date
      auto year = (alarmDate >> 9) + 1980;
      auto month = (alarmDate >> 5) & 0b00001111;
      auto day = alarmDate & 0b00011111;
      auto hour = (alarmTime >> 11) & 0b00011111;
      auto minute = (alarmTime >> 5) & 0b0011111;
      auto second = (alarmTime & 0b00011111) * 2;
      
      return std::to_string(year) + "-" +
        ((month < 10) ? "0" : "") + std::to_string(month) + "-" + 
        ((day < 10) ? "0" : "") + std::to_string(day) + " " +
        ((hour < 10) ? "0" : "") + std::to_string(hour) + ":" +
        ((minute < 10) ? "0" : "") + std::to_string(minute) + ":" +
        ((second < 10) ? "0" : "") + std::to_string(second);
  - platform: template
    name: "Alarm 2 DateTime"
    id: alarm_list_2_datetime
    lambda: |-
      uint16_t alarmDate = id(alarm_list_2_date).state;
      uint16_t alarmTime = id(alarm_list_2_time).state;

