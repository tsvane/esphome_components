  - platform: modbus_controller
    modbus_controller_id: nilan_modbus_controller
    name: "Heating Select"
    id: heating_select
    register_type: holding
    address: 1801
    force_new_range: true
    use_write_multiple: true
    value_type: U_WORD
    optionsmap:
      "Only Pump motion and freeze secure" : 0
      "Always central heating" : 1
      "Only central heating when room temperature low" : 2
