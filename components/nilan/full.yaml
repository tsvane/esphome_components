###########################
#### HOLDING REGISTERS ####
###########################

binary_sensor:
#########################
#### INPUT REGISTERS ####
#########################
  - platform: modbus_controller
    modbus_controller_id: nilan_modbus_controller
    name: "Hot Water Boiling"
    id: nilan_hot_water_boiling
    register_type: read
    address: 109

  - platform: modbus_controller
    modbus_controller_id: nilan_modbus_controller
    name: "Hot Water 3-Way Valve Position"
    id: nilan_3_way_position
    register_type: read
    address: 110

  - platform: modbus_controller
    modbus_controller_id: nilan_modbus_controller
    name: "Hotgas Defrost"
    id: nilan_hotgas_defrost
    register_type: read
    address: 111

  - platform: modbus_controller
    modbus_controller_id: nilan_modbus_controller
    name: "Defrost Thermostat"
    id: nilan_defrost_thermostat
    register_type: read
    address: 112

###########################
#### HOLDING REGISTERS ####
###########################
  - platform: modbus_controller
    modbus_controller_id: nilan_modbus_controller
    name: "Air Flap"
    id: nilan_air_flap
    register_type: holding
    address: 100

  - platform: modbus_controller
    modbus_controller_id: nilan_modbus_controller
    name: "Smoke Flap"
    id: nilan_smoke_flap
    register_type: holding
    address: 101

  - platform: template
    id: nilan_bypass_state
    name: Bypass State
    device_class: opening
    
  - platform: modbus_controller
    modbus_controller_id: nilan_modbus_controller
    id: nilan_bypass_open_request
    register_type: holding
    address: 102
    on_state: 
    - lambda: !lambda |-
        id(nilan_bypass_state).publish_state(true);
        
  - platform: modbus_controller
    modbus_controller_id: nilan_modbus_controller
    id: nilan_bypass_close_request
    register_type: holding
    address: 103
    on_state: 
    - lambda: !lambda |-
        id(nilan_bypass_state).publish_state(false);
    
  - platform: modbus_controller
    modbus_controller_id: nilan_modbus_controller
    name: "Air Heat Circulation Pump"
    id: nilan_air_heat_circulation_pump
    register_type: holding
    address: 104
    
  - platform: modbus_controller
    modbus_controller_id: nilan_modbus_controller
    name: "Air Heating Selected"
    id: nilan_air_heat_selected
    register_type: holding
    address: 105
    
  - platform: modbus_controller
    modbus_controller_id: nilan_modbus_controller
    name: "Compressor"
    id: nilan_compressor
    register_type: holding
    address: 109

  - platform: modbus_controller
    modbus_controller_id: nilan_modbus_controller
    name: "Compressor 2"
    id: nilan_compressor_2
    register_type: holding
    address: 110 

